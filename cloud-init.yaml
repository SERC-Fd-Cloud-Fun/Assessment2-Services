  # -- composer.json --------------------------------------------------------
  - path: /var/www/openday/composer.json
    encoding: b64
    owner: www-data:www-data
    permissions: '0640'
    content: ew0KICAgICJyZXF1aXJlIjogew0KICAgICAgICAibWljcm9zb2Z0L2F6dXJlLXN0b3JhZ2UtYmxvYiI6ICJeMS41Ig0KICAgIH0NCn0NCg==

  # -- Apache virtual host --------------------------------------------------
  - path: /etc/apache2/sites-available/openday.conf
    owner: root:root
    permissions: '0644'
    content: |
      <VirtualHost *:80>
          ServerAdmin webmaster@localhost
          DocumentRoot /var/www/openday

          <Directory /var/www/openday>
              Options -Indexes -FollowSymLinks
              AllowOverride None
              Require all granted
              DirectoryIndex index.php
          </Directory>

          Include conf-available/openday-env.conf

          ErrorLog  ${APACHE_LOG_DIR}/openday-error.log
          CustomLog ${APACHE_LOG_DIR}/openday-access.log combined
      </VirtualHost>

  # -- Apache environment variables (connection string) --------------------
  # Replace the placeholder before passing this file to az vm create:
  #   sed -i 's|REPLACE_WITH_CONNECTION_STRING|<your-string>|' cloud-init.yaml
  - path: /etc/apache2/conf-available/openday-env.conf
    owner: root:root
    permissions: '0640'
    content: |
      # Azure Storage connection string for the Open Day Registration app.
      SetEnv AZURE_STORAGE_CONNECTION_STRING "REPLACE_WITH_CONNECTION_STRING"


# ---------------------------------------------------------------------------
# Commands to run on first boot (after write_files)
# ---------------------------------------------------------------------------
runcmd:
  # -- Install Composer -----------------------------------------------------
  - |
    EXPECTED="$(curl -sS https://composer.github.io/installer.sig)"
    curl -sS https://getcomposer.org/installer -o /tmp/composer-setup.php
    ACTUAL="$(php -r "echo hash_file('sha384', '/tmp/composer-setup.php');")"
    if [ "$EXPECTED" != "$ACTUAL" ]; then
      echo "ERROR: Composer installer checksum mismatch" >&2
      rm -f /tmp/composer-setup.php
      exit 1
    fi
    php /tmp/composer-setup.php --quiet --install-dir=/usr/local/bin --filename=composer
    rm -f /tmp/composer-setup.php

  # -- Install PHP dependencies ---------------------------------------------
  - composer install --working-dir=/var/www/openday --no-interaction --no-dev --optimize-autoloader --quiet

  # -- File ownership and permissions ---------------------------------------
  - chown -R www-data:www-data /var/www/openday
  - find /var/www/openday -type d -exec chmod 750 {} \;
  - find /var/www/openday -type f -exec chmod 640 {} \;

  # -- Enable Apache modules, site; disable default site ------------------
  - a2enmod rewrite
  - a2enconf openday-env
  - a2ensite openday
  - a2dissite 000-default
  - apache2ctl configtest

  # -- Start and enable Apache on boot --------------------------------------
  - systemctl restart apache2
  - systemctl enable apache2
