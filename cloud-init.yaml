#cloud-config
# =============================================================================
# cloud-init.yaml — Open Day Registration App
#
# Provisions Apache2 + PHP + the file-upload app on first boot.
#
# BEFORE USE — replace the placeholder below with your real connection string:
#
#   sed -i 's|REPLACE_WITH_CONNECTION_STRING|DefaultEndpointsProtocol=https;...|' cloud-init.yaml
#
# Then pass the file to your Azure CLI VM create command:
#
#   az vm create \
#     --resource-group <rg> \
#     --name openday-vm \
#     --image Ubuntu2404 \
#     --custom-data @cloud-init.yaml \
#     --generate-ssh-keys \
#     --public-ip-sku Standard \
#     --size Standard_B1s
# =============================================================================

# ---------------------------------------------------------------------------
# Packages to install (runs apt-get update automatically)
# ---------------------------------------------------------------------------
package_update: true
package_upgrade: true

packages:
  - apache2
  - php
  - libapache2-mod-php
  - php-cli
  - php-curl
  - php-fileinfo
  - php-json
  - php-mbstring
  - php-xml
  - php-zip
  - unzip
  - curl
  - rsync

# ---------------------------------------------------------------------------
# Write application files and Apache configuration
# ---------------------------------------------------------------------------
